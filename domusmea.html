<!DOCTYPE html>

<html>
	<head>
		<style>
			body { margin: 0; }
			canvas { width: 100%; height: 100% }
		</style>
		<script type="importmap">
			{ "imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
				"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
				"domus-mea": "https://cdn.jsdelivr.net/gh/boytchev/CourseOKG@latest/domus-mea.js",
				"csg/": "https://cdn.jsdelivr.net/gh/looeee/threejs-csg@main/src/CSG/"
			} }
		</script>
	</head>
	
	<body>

		<script type="module">
			import * as THREE from "three";
			import {domusMea, scene, renderer, camera} from "domus-mea";
			import {CSG} from "csg/CSG.js";

			domusMea( '4MI0800414' );

			var geometry = new THREE.BoxGeometry( 0.2, 3, 7),
				material = new THREE.MeshPhongMaterial( {color: 'peachpuff'} );
			
			//външни стени
			var wallEast = new THREE.Mesh( geometry, material );
			wallEast.position.set( 2.9, 1.5, 1.5 )
			wallEast.receiveShadow = true;
			wallEast.castShadow = true;
			
			var door = new THREE.Mesh( new THREE.BoxGeometry(0.2, 2, 1 ) );
			door.position.set( 2.9, 1, -0.9 );
			var csg = new CSG();
			csg.subtract([wallEast, door]);
			var wallEastWithDoor = csg.toMesh();
			wallEastWithDoor.receiveShadow = true;
			wallEastWithDoor.castShadow = true;
			scene.add( wallEastWithDoor );	
		
			var opositeWall = wallEast.clone();
			opositeWall.position.x = -6.9;
			scene.add( opositeWall );

			var wallSouth = wallEast.clone();
			wallSouth.geometry = new THREE.BoxGeometry( 9.6, 3, 0.2 );
			wallSouth.position.set( -2, 1.5, 4.9 );

			var window = new THREE.Mesh( new THREE.BoxGeometry( 3, 1, 0.2 ) );
			window.position.set( -4.5, 1.75, 4.9 );
			csg = new CSG();
			csg.subtract( [wallSouth, window] );
			var wallSouthWithWindow = csg.toMesh();
			wallSouthWithWindow.receiveShadow = true;
			wallSouthWithWindow.castShadow = true;
			scene.add( wallSouthWithWindow );

			var shortWallEast = wallEast.clone();
			shortWallEast.geometry = new THREE.BoxGeometry( 1, 3, 0.2 );
			shortWallEast.position.set( 2.3, 1.5, -1.9 );
			scene.add( shortWallEast );

			var shortWallOposite = shortWallEast.clone();
			shortWallOposite.position.x = -6.3;
			scene.add( shortWallOposite );

			var wallNorthEast = wallEast.clone();
			wallNorthEast.position.x = wallEast.position.x - 1;
			wallNorthEast.position.z = wallEast.position.z - 7;

			window.rotateY( Math.PI/2 );
			window.position.set( 1.9, 1.75, -5 );
			csg = new CSG();
			csg.subtract( [wallNorthEast, window] );
			var wallNorthEastWithWindow = csg.toMesh();
			wallNorthEastWithWindow.castShadow = true;
			wallNorthEastWithWindow.receiveShadow = true;
			scene.add( wallNorthEastWithWindow );

			var wallNorthOposite = opositeWall.clone();
			wallNorthOposite.position.x = opositeWall.position.x + 1;
			wallNorthOposite.position.z = opositeWall.position.z - 7;
			scene.add( wallNorthOposite );

			var wallNorth = wallSouth.clone();
			wallNorth.geometry = new THREE.BoxGeometry( 7.6, 3, 0.2 );
			wallNorth.position.z = -8.9;
			scene.add( wallNorth );

			//странната стена
			var wall1 = wallEast.clone();
			wall1.geometry = new THREE.BoxGeometry( 0.2, 3, 3 );
			wall1.position.x = 0.1;
			wall1.position.z = wallEast.position.z + 2;
			scene.add( wall1 );

			var middle = wall1.clone();
			middle.geometry = new THREE.BoxGeometry( 0.2, 3, Math.sqrt(5));
			middle.position.set( -0.48, 1.5, 1.1 );
			middle.rotateY( Math.atan(0.628) );
			scene.add( middle );

			var wall2 = wall1.clone();
			wall2.geometry = new THREE.BoxGeometry( 0.2, 3, 2 );
			wall2.position.set( -1.06, 1.5, -0.8 );
			
			door.position.set( -1.06, 1, -0.9 );
			csg = new CSG();
			csg.subtract( [wall2, door] );
			var wall2WithDoor = csg.toMesh();
			wall2WithDoor.castShadow = true;
			wall2WithDoor.receiveShadow = true;
			scene.add( wall2WithDoor );
			
			//вътрешни стени
			var wallCenter = wallNorth.clone();
			wallCenter.position.set( -2, 1.5, -1.9 );
			
			door.position.set( 0.5, 1, -1.9 );
			door.rotateY(Math.PI/2);
			var door1 = door.clone();
			door1.position.set( -4.5, 1, -1.9 );
			csg = new CSG();
			csg.subtract( [wallCenter, door, door1] );
			var wallCenterWithDoor = csg.toMesh();
			wallCenterWithDoor.castShadow = true;
			wallCenterWithDoor.receiveShadow = true;
			scene.add( wallCenterWithDoor );

			
			var wallCenter2 = wallNorthEast.clone();
			wallCenter2.position.x = (wallNorthEast.position.x + wallNorthOposite.position.x) / 2 - 1.1;
			wallCenter2.position.z = (wallNorthEast.position.z + wallNorthOposite.position.z) / 2;
			
			door.position.x = wallCenter2.position.x;
			door.position.z = -7.5;
			door.rotateY( -Math.PI/2 );
			csg = new CSG();
			csg.subtract( [wallCenter2, door] );
			var wallCenter2WithDoor = csg.toMesh();
			wallCenter2WithDoor.castShadow = true;
			wallCenter2WithDoor.receiveShadow = true;
			scene.add( wallCenter2WithDoor );

			//създавам първата чиния
			var material = new THREE.MeshPhongMaterial( {color: 0x00F000});
			var mainCone = new THREE.Mesh( new THREE.ConeGeometry( 0.2, 0.2, 64, 1), material);
			var coneToRemove = mainCone.clone();
			mainCone.position.set( 0, 1, 0 );
			coneToRemove.position.set( 0, 1.075, 0 );
			csg = new CSG();
			csg.subtract( [mainCone, coneToRemove] );
			var diffPlate = csg.toMesh();
			diffPlate.castShadow = true;
			diffPlate.receiveShadow = true;

			diffPlate.rotateX( Math.PI );
			diffPlate.position.set( 0, 1, 0 );
			
			var innerPlate = diffPlate.clone();
			innerPlate.position.set( 0, 1.03, 0 );

			csg = new CSG();
			csg.subtract( [diffPlate, innerPlate ]);
			var plate = csg.toMesh();
			plate.castShadow = true;
			plate.receiveShadow = true;

			plate.position.set(-1, 0, -6);
			scene.add( plate );

			//създавам много чинии
			var alpha = 0;
			var change = 2 * Math.PI / 14;
			var hexColor = 0x00F000;
			for (var i = 0; i < 14; ++i) {
				var currPlate = plate.clone();
				currPlate.material = new THREE.MeshPhongMaterial( {color: hexColor});
				currPlate.position.x = Math.cos(alpha) - 1;
				currPlate.position.z = Math.sin(alpha) - 6;
				scene.add( currPlate );
				alpha += change;
				hexColor += 0x0000F;
			}

			//печка с кюнци
			var shape = new THREE.Shape();
			shape.moveTo( -0.25, -0.5 );
			shape.lineTo( 0.25, -0.5 );
			shape.lineTo( 0.25, 0.5 );
			shape.lineTo( -0.25, 0.5 );

			var extrudeSettings = {
					depth: 0.5,
					bevelEnabled: true,
					bevelSegments: 8,
					steps: 8,
					bevelSize: 0.1,
					bevelThickness: 0.1 
				};
			var geometry = new THREE.ExtrudeGeometry( shape, extrudeSettings );
			var body = new THREE.Mesh( geometry, new THREE.MeshPhongMaterial( {color: 0x7a5151}));
			body.position.set( 0, 0.5, 0 );
			body.castShadow = true;
			body.receiveShadow = true;

			var shkafZaPepel = new THREE.Mesh( new THREE.BoxGeometry( 0.3, 0.15, 0.4 ),
										   	   new THREE.MeshPhongMaterial( {color: 0x1bcc23}));
			shkafZaPepel.position.set( 0.225, 0.15, 0.25 );
			shkafZaPepel.castShadow = true;
			shkafZaPepel.receiveShadow = true;

			var drujkaZaShkafZaPepel = new THREE.Mesh( new THREE.SphereGeometry( 0.025, 16, 16 ),
									   new THREE.MeshPhongMaterial( {color: 'red'}));
			drujkaZaShkafZaPepel.position.set( 0.4, 0.15, 0.25 );
			drujkaZaShkafZaPepel.castShadow = true;
			drujkaZaShkafZaPepel.receiveShadow = true;

			var vratickaZaSlaganeNaDurva = new THREE.Mesh( new THREE.BoxGeometry( 0.3, 0.4, 0.4 ),
										   	   new THREE.MeshBasicMaterial( {color: 0xbf4c0a,
																			 opacity: 0.5,
																			 transparent: true
											   }));
			vratickaZaSlaganeNaDurva.position.set( 0.225, 0.5, 0.25 );
			vratickaZaSlaganeNaDurva.castShadow = true;
			vratickaZaSlaganeNaDurva.receiveShadow = true;

			var drujkaZaVraticka = new THREE.Mesh( new THREE.BoxGeometry( 0.05, 0.15, 0.025 ),
												   new THREE.MeshPhongMaterial( {color: 0x0000FF}));
			drujkaZaVraticka.position.set( 0.4, 0.5, 0.1 );
			drujkaZaVraticka.castShadow = true;
			drujkaZaVraticka.receiveShadow = true;

			var kunec = new THREE.Mesh( new THREE.CylinderGeometry( 0.1, 0.1, 2, 32, 32),
										new THREE.MeshPhongMaterial( {color: 0x7a5151}));
			kunec.position.set( -0.2, 2, 0.1);
			kunec.castShadow = true;
			kunec.receiveShadow = true;

			var pechka = new THREE.Group();
			pechka.add( body );
			pechka.add( shkafZaPepel );
			pechka.add( drujkaZaShkafZaPepel );
			pechka.add( vratickaZaSlaganeNaDurva );
			pechka.add( drujkaZaVraticka );
			pechka.add( kunec );
			pechka.rotateY( Math.PI );

			pechka.position.set( -0.6, 0, 4.5 );
			scene.add( pechka );
		</script>
		
	</body>
</html>
